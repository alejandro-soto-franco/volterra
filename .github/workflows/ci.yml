name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
        with:
          components: clippy
      - run: cargo test --workspace --exclude volterra-py
      - run: cargo clippy --workspace --exclude volterra-py -- -D warnings

  python-check:
    name: Python bindings compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
      - run: cargo check -p volterra-py

  pytest:
    name: Python bindings (maturin + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
      - uses: astral-sh/setup-uv@v5
      # Build the extension into a uv venv and run the Python smoke suite.
      - name: Build and test
        working-directory: volterra-py
        run: |
          uv venv
          uv pip install maturin pytest numpy
          source .venv/bin/activate
          maturin develop
          pytest tests/ -q

  bench:
    name: Benches + perf floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
      # Compile-gate the benches (catches API drift without spending time measuring).
      - run: cargo bench --workspace --exclude volterra-py --no-run
      # Execute the release-mode regression assertion.
      - run: cargo test --release -p volterra-solver --test perf_floor
