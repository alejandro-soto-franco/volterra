name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
        with:
          components: clippy
      - run: cargo test --workspace --exclude volterra-py
      - run: cargo clippy --workspace --exclude volterra-py -- -D warnings

  python-check:
    name: Python bindings compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - run: cargo check -p volterra-py

  bench:
    name: Benches + perf floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      # Compile-gate the benches (catches API drift without spending time measuring).
      - run: cargo bench --workspace --exclude volterra-py --no-run
      # Execute the release-mode regression assertion.
      - run: cargo test --release -p volterra-solver --test perf_floor
